---
- name: Prepare Machine
  hosts:
    - routing.osgiliath.test
  gather_facts: no
  tasks:
    - name: "install fedora ansible prerequisites"
      ansible.builtin.raw: dnf install -y python3 python3-libdnf5
      changed_when: false
      become: true

    - name: "wait for systemd to reach multi-user target before converge"
      ansible.builtin.raw: timeout 30 systemctl is-system-running --wait || true
      changed_when: false
      become: true
