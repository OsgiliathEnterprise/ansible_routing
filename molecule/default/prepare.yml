---
- name: Prepare Machine
  hosts:
    - routing.osgiliath.test
  tasks:
    - name: "install fedora ansible prerequisites"
      ansible.builtin.raw: dnf install -y python3 python3-libdnf5
      changed_when: false
      become: true
    - name: Show virtualization type
      debug:
        var: ansible_facts.virtualization_type
